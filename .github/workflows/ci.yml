name: MAUI CI

on:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Build Android & Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Android Dependencies
        run: dotnet restore src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -p:TargetFramework=net10.0-android

      - name: Restore Windows Dependencies
        run: dotnet restore src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Publish Android
        run: dotnet publish src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -f net10.0-android -c Release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-android/**/*-Signed.apk
          retention-days: 7

      - name: Publish Windows
        run: dotnet publish src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -f net10.0-windows10.0.19041.0 -c Release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-windows10.0.19041.0/**/publish/
          retention-days: 7

  build-macos:
    name: Build iOS & Mac Catalyst
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Dependencies
        run: dotnet restore src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj

      - name: Build iOS
        run: >
          dotnet build src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj
          -f net10.0-ios
          -c Release
          -p:RuntimeIdentifier=iossimulator-x64
          -p:BuildIpa=false

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-ios/iossimulator-x64/**/*.app
          retention-days: 7

      - name: Publish Mac Catalyst
        run: >
          dotnet publish src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj
          -f net10.0-maccatalyst
          -c Release
          -p:CodesignKey=""
          -p:CodesignRequire=false

      - name: Upload Mac Catalyst Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: maccatalyst-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-maccatalyst/**/publish/
          retention-days: 7
