name: MAUI CI

on:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Build Android & Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Dependencies
        run: dotnet restore src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -r win-x64

      - name: Build Android
        run: dotnet build src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -f net10.0-android -c Release --no-restore

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-android/
          retention-days: 7

      - name: Build Windows
        run: dotnet build src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-windows10.0.19041.0/
          retention-days: 7

  build-macos:
    name: Build iOS & Mac Catalyst
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Dependencies
        run: dotnet restore src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj -r ios-arm64

      - name: Build iOS
        run: >
          dotnet build src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj
          -f net10.0-ios
          -c Release
          --no-restore
          -p:RuntimeIdentifier=ios-arm64
          -p:CodesignKey=""
          -p:CodesignRequire=false
          -p:ArchiveOnBuild=false

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-ios/
          retention-days: 7

      - name: Build Mac Catalyst
        run: >
          dotnet build src/Apps/BeanTracker.MAUI/BeanTracker.MAUI.csproj
          -f net10.0-maccatalyst
          -c Release
          --no-restore
          -p:CodesignKey=""
          -p:CodesignRequire=false

      - name: Upload Mac Catalyst Artifact
        uses: actions/upload-artifact@v7
        with:
          name: maccatalyst-build
          path: src/Apps/BeanTracker.MAUI/bin/Release/net10.0-maccatalyst/
          retention-days: 7
